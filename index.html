<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>菜籃通 — 當季蔬菜與菜價即時查</title>
<style>
  :root{
    --green:#3a7d44;
    --green-light:#e8f3e8;
    --green-dark:#2c5e34;
    --bg:#fafaf5;
    --card:#ffffff;
    --text:#2d2d2d;
    --muted:#7a7a7a;
    --border:#e3e3d8;
    --accent:#f4a261;
    --red:#c1554a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"PingFang TC","Microsoft JhengHei","Helvetica Neue",Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.55;
  }
  header{
    background:linear-gradient(135deg,var(--green) 0%,var(--green-dark) 100%);
    color:#fff;
    padding:20px 16px 14px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
  }
  header h1{font-size:22px;font-weight:600;letter-spacing:.5px}
  header p{font-size:12px;opacity:.85;margin-top:4px}
  .status-bar{
    background:var(--green-light);
    padding:6px 16px;
    font-size:12px;
    color:var(--green-dark);
    text-align:center;
    border-bottom:1px solid var(--border);
  }
  .status-bar.warn{background:#fff4e6;color:#a8580a;border-bottom-color:#f0d8b0}

  nav.tabs{
    display:flex;
    background:#fff;
    border-bottom:1px solid var(--border);
    position:sticky;top:0;z-index:10;
  }
  nav.tabs button{
    flex:1;
    padding:14px 8px;
    background:transparent;
    border:none;
    cursor:pointer;
    font-size:15px;
    font-weight:500;
    color:var(--muted);
    border-bottom:3px solid transparent;
    transition:all .15s;
    font-family:inherit;
  }
  nav.tabs button:hover{color:var(--green-dark);background:#f6f6f0}
  nav.tabs button.active{
    color:var(--green-dark);
    border-bottom-color:var(--green);
    background:#fff;
  }

  main{max-width:880px;margin:0 auto;padding:16px}
  section.tab-panel{display:none}
  section.tab-panel.active{display:block}

  /* === 蔬菜索引 === */
  .month-filter{
    display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;
    padding:10px;background:#fff;border-radius:10px;border:1px solid var(--border);
  }
  .month-filter span.label{font-size:13px;color:var(--muted);align-self:center;margin-right:4px}
  .month-filter button{
    padding:5px 10px;font-size:12px;border:1px solid var(--border);
    background:#fff;border-radius:14px;cursor:pointer;font-family:inherit;
  }
  .month-filter button.active{background:var(--green);color:#fff;border-color:var(--green)}

  .veg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .veg-card{
    background:var(--card);border:1px solid var(--border);border-radius:12px;
    overflow:hidden;cursor:pointer;transition:all .15s;
  }
  .veg-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.07);transform:translateY(-2px)}
  .veg-card-head{
    display:flex;align-items:center;gap:12px;padding:14px;
    background:linear-gradient(135deg,#f4faef 0%,#e8f3e8 100%);
    border-bottom:1px solid var(--border);
  }
  .veg-emoji{font-size:42px;line-height:1}
  .veg-name{font-size:18px;font-weight:600;color:var(--green-dark)}
  .veg-tag{
    display:inline-block;font-size:11px;background:var(--green);color:#fff;
    padding:2px 8px;border-radius:10px;margin-top:4px;
  }
  .veg-tag.off{background:#bbb}
  .veg-card-body{padding:12px 14px;display:none}
  .veg-card.expanded .veg-card-body{display:block}
  .veg-section{margin-top:10px}
  .veg-section h4{
    font-size:13px;color:var(--muted);font-weight:600;
    margin-bottom:6px;border-left:3px solid var(--green);padding-left:6px;
  }
  .price-row{
    display:flex;justify-content:space-between;font-size:13px;
    padding:5px 0;border-bottom:1px dashed var(--border);
  }
  .price-row:last-child{border-bottom:none}
  .price-row .market{flex:1}
  .price-row .market small{display:block;color:var(--muted);font-size:11px;margin-top:1px}
  .price-row .price{font-weight:600;color:var(--red);min-width:80px;text-align:right}
  .recipe-list{display:flex;flex-wrap:wrap;gap:6px}
  .recipe-chip{
    font-size:12px;background:#fff4e6;color:#a8580a;
    padding:4px 10px;border-radius:12px;border:1px solid #f0d8b0;
  }
  .month-pills{display:flex;flex-wrap:wrap;gap:4px}
  .month-pill{
    font-size:11px;padding:2px 7px;border-radius:8px;
    background:#eee;color:#888;
  }
  .month-pill.in-season{background:var(--green);color:#fff}

  /* === 菜價排行榜 === */
  .rank-controls{
    display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap;
    background:#fff;padding:10px;border-radius:10px;border:1px solid var(--border);
  }
  .rank-controls label{font-size:13px;color:var(--muted)}
  .rank-controls select,.rank-controls button{
    padding:6px 10px;font-size:13px;border:1px solid var(--border);
    background:#fff;border-radius:6px;font-family:inherit;cursor:pointer;
  }
  .rank-controls button.sort-btn.active{background:var(--green);color:#fff;border-color:var(--green)}

  table.rank-table{
    width:100%;background:#fff;border-collapse:collapse;
    border-radius:10px;overflow:hidden;border:1px solid var(--border);
  }
  table.rank-table th{
    background:var(--green-light);color:var(--green-dark);
    padding:10px 8px;font-size:13px;text-align:left;font-weight:600;
  }
  table.rank-table td{padding:10px 8px;font-size:14px;border-top:1px solid var(--border)}
  table.rank-table .rank-num{
    width:32px;text-align:center;color:var(--muted);font-weight:600;
  }
  table.rank-table .price-cell{font-weight:600;color:var(--red);text-align:right}
  table.rank-table tr:hover{background:#fafaf5}
  .rank-emoji{margin-right:6px}

  /* === 搜尋 === */
  .search-box{
    display:flex;gap:8px;margin-bottom:14px;
  }
  .search-box input{
    flex:1;padding:12px 14px;font-size:15px;
    border:2px solid var(--border);border-radius:10px;font-family:inherit;
  }
  .search-box input:focus{outline:none;border-color:var(--green)}
  .search-hint{
    font-size:12px;color:var(--muted);margin-bottom:10px;
  }
  .search-empty{
    text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;
  }

  .loading{text-align:center;padding:30px;color:var(--muted);font-size:14px}
  footer{text-align:center;padding:20px;font-size:11px;color:var(--muted)}

  @media (max-width:520px){
    .veg-grid{grid-template-columns:1fr}
    header h1{font-size:18px}
  }
</style>
</head>
<body>

<header>
  <h1>🥬 菜籃通</h1>
  <p>當季蔬菜・各市場菜價・料理靈感一次看</p>
</header>
<div class="status-bar" id="statusBar">資料載入中…</div>

<nav class="tabs">
  <button class="tab-btn active" data-tab="index">🥗 蔬菜索引</button>
  <button class="tab-btn" data-tab="rank">📊 菜價排行榜</button>
  <button class="tab-btn" data-tab="search">🔍 搜尋</button>
</nav>

<main>
  <!-- 蔬菜索引 -->
  <section class="tab-panel active" id="tab-index">
    <div class="month-filter" id="monthFilter">
      <span class="label">月份：</span>
      <button data-month="0" class="active">全部</button>
    </div>
    <div class="veg-grid" id="vegGrid">
      <div class="loading">載入中…</div>
    </div>
  </section>

  <!-- 菜價排行榜 -->
  <section class="tab-panel" id="tab-rank">
    <div class="rank-controls">
      <label>市場：</label>
      <select id="rankMarketFilter">
        <option value="">全部市場</option>
      </select>
      <label>排序：</label>
      <button class="sort-btn active" data-order="asc">最低 → 最高</button>
      <button class="sort-btn" data-order="desc">最高 → 最低</button>
    </div>
    <table class="rank-table">
      <thead>
        <tr>
          <th class="rank-num">#</th>
          <th>蔬菜</th>
          <th>市場</th>
          <th style="text-align:right">均價 (元/公斤)</th>
        </tr>
      </thead>
      <tbody id="rankTbody">
        <tr><td colspan="4" class="loading">載入中…</td></tr>
      </tbody>
    </table>
  </section>

  <!-- 搜尋 -->
  <section class="tab-panel" id="tab-search">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="輸入蔬菜名稱，例如：高麗菜、空心菜、tomato…" autocomplete="off">
    </div>
    <div class="search-hint">支援部分名稱、別名與相關性搜尋</div>
    <div class="veg-grid" id="searchResults">
      <div class="search-empty">輸入關鍵字開始搜尋</div>
    </div>
  </section>
</main>

<footer>
  資料來源：農業部農產品交易行情站 (data.moa.gov.tw) ・ 食譜推薦為示意內容
</footer>

  "台東市":   {addr:"台東縣台東市更生路 596 號",          short:"台東"},
};
function getMarketInfo(name){
  // 模糊比對
  if(MARKETS[name]) return {name, ...MARKETS[name]};
  for(const k of Object.keys(MARKETS)){
    if(name.includes(k)||k.includes(name)) return {name, ...MARKETS[k]};
  }
  return {name, addr:"地址資訊待補", short:name};
}

/* ============================================================
   API：農業部農產品交易行情
   ============================================================ */
const API_BASE = "https://data.moa.gov.tw/Service/OpenData/FromM/AgriProductsTransType.aspx";
let priceData = []; // { cropName, marketName, avgPrice, date }
let dataMode = "loading"; // loading / api / fallback

async function fetchPriceData(){
  // 嘗試從 API 取得最近一日資料
  try{
    const res = await fetch(API_BASE,{cache:"no-store"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data = await res.json();
    if(!Array.isArray(data) || !data.length) throw new Error("empty");
    // 標準化欄位
    priceData = data.map(d => ({
      cropName: d.CropName || d.作物名稱 || "",
      marketName: d.MarketName || d.市場名稱 || "",
      avgPrice: parseFloat(d.Avg_Price || d.平均價 || 0),
      date: d.TransDate || d.交易日期 || ""
    })).filter(d => d.cropName && d.marketName && d.avgPrice > 0);

    if(!priceData.length) throw new Error("no valid rows");
    dataMode = "api";
    return;
  }catch(e){
    console.warn("API 取得失敗，使用內建備援價格:", e);
    dataMode = "fallback";
    priceData = generateFallbackPrices();
  }
}

function generateFallbackPrices(){
  // 根據蔬菜詞庫產生擬真備援資料（每種蔬菜 2~4 個市場）
  const sampleMarkets = ["台北一","台北二","三重區","板橋區","台中市","高雄市","西螺鎮"];
  const baseRange = {
    "高麗菜":[15,40],"大白菜":[20,50],"小白菜":[25,50],"青江菜":[25,55],
    "菠菜":[40,80],"空心菜":[20,45],"地瓜葉":[18,38],"莧菜":[25,55],
    "茼蒿":[60,110],"芹菜":[40,90],"花椰菜":[30,70],"青花菜":[40,90],
    "番茄":[35,75],"小黃瓜":[25,60],"絲瓜":[30,65],"苦瓜":[40,85],
    "茄子":[25,55],"青椒":[40,80],"洋蔥":[15,35],"紅蘿蔔":[20,45],
    "白蘿蔔":[15,35],"馬鈴薯":[25,55],"芋頭":[40,90],"南瓜":[20,50],
    "玉米":[20,40],"竹筍":[40,110],"韭菜":[30,70],"蔥":[40,180],
    "蒜頭":[80,180],"薑":[60,140],"山藥":[60,150],"敏豆":[45,95],
    "豌豆":[50,120],"金針菇":[35,65],"香菇":[140,260]
  };
  const today = new Date().toISOString().slice(0,10);
  const out=[];
  for(const v of VEGETABLES){
    const r = baseRange[v.key] || [30,80];
    const n = 3 + Math.floor(Math.random()*2);
    const shuffled = [...sampleMarkets].sort(()=>Math.random()-.5).slice(0,n);
    for(const m of shuffled){
      const p = r[0] + Math.random()*(r[1]-r[0]);
      out.push({cropName:v.key, marketName:m, avgPrice:Math.round(p*10)/10, date:today});
    }
  }
  return out;
}

/* ============================================================
   工具：把 API 中的作物名稱對應到我們的詞庫
   ============================================================ */
function findVegByCropName(cropName){
  if(!cropName) return null;
  for(const v of VEGETABLES){
    if(cropName === v.key) return v;
    if(cropName.includes(v.key)) return v;
    if(v.aliases.some(a => cropName.includes(a) || a.includes(cropName))) return v;
  }
  return null;
}
function getPricesForVeg(veg){
  return priceData.filter(p => {
    const matched = findVegByCropName(p.cropName);
    return matched && matched.key === veg.key;
  });
}

/* ============================================================
   頁籤切換
   ============================================================ */
document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));

    document.getElementById("tab-"+btn.dataset.tab).classList.add("active");

/* ============================================================
   渲染：蔬菜索引
   ============================================================ */
let currentMonthFilter = 0; // 0 = 全部
const CHINESE_MONTH = ["一","二","三","四","五","六","七","八","九","十","十一","十二"];

function buildMonthFilter(){
  const wrap = document.getElementById("monthFilter");
  const thisMonth = new Date().getMonth()+1;
  for(let m=1;m<=12;m++){
    const b = document.createElement("button");
    b.dataset.month = m;
    b.textContent = m+"月";
    if(m === thisMonth){
      b.textContent = m+"月 (本月)";
    }
    wrap.appendChild(b);
  }
  wrap.querySelectorAll("button").forEach(b=>{
    b.addEventListener("click",()=>{
      wrap.querySelectorAll("button").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      currentMonthFilter = parseInt(b.dataset.month,10);
      renderIndex();
    });
  });
  // 預設本月
  const cur = wrap.querySelector(`button[data-month="${thisMonth}"]`);
  if(cur){
    wrap.querySelectorAll("button").forEach(x=>x.classList.remove("active"));
    cur.classList.add("active");
    currentMonthFilter = thisMonth;
  }
}

function renderIndex(){
  const grid = document.getElementById("vegGrid");
  const list = currentMonthFilter === 0
    ? VEGETABLES
    : VEGETABLES.filter(v => v.months.includes(currentMonthFilter));

  // 把當季的排在前面（即便篩選為全部時也按本月當季排序）
  const ref = currentMonthFilter || (new Date().getMonth()+1);
  list.sort((a,b)=>{
    const ai = a.months.includes(ref)?0:1;
    const bi = b.months.includes(ref)?0:1;
    return ai-bi;
  });

  if(!list.length){
    grid.innerHTML = `<div class="search-empty">這個月沒有特別當季的蔬菜，試試其他月份。</div>`;
    return;
  }
  grid.innerHTML = list.map(v => vegCardHTML(v, ref)).join("");
  attachCardToggle(grid);
}

function vegCardHTML(v, refMonth){
  const inSeason = v.months.includes(refMonth);
  const prices = getPricesForVeg(v);
  const pricesHTML = prices.length
    ? prices.slice(0,6).map(p=>{
        const m = getMarketInfo(p.marketName);
        return `<div class="price-row">
          <div class="market">${escape(m.short)}<small>📍 ${escape(m.addr)}</small></div>
          <div class="price">$${p.avgPrice.toFixed(1)}</div>
        </div>`;
      }).join("")
    : `<div class="search-empty" style="padding:14px">今日尚無此蔬菜在各市場的成交資料。</div>`;

  const monthsHTML = Array.from({length:12},(_,i)=>{
    const m = i+1;
    const cls = v.months.includes(m) ? "month-pill in-season" : "month-pill";
    return `<span class="${cls}">${m}</span>`;
  }).join("");

  return `<div class="veg-card" data-key="${escape(v.key)}">
    <div class="veg-card-head">
      <div class="veg-emoji">${v.emoji}</div>
      <div>
        <div class="veg-name">${escape(v.key)}</div>
        <span class="veg-tag ${inSeason?"":"off"}">${inSeason?"當季":"非當季"}</span>
      </div>
    </div>
    <div class="veg-card-body">
      <div class="veg-section">
        <h4>當季月份</h4>
        <div class="month-pills">${monthsHTML}</div>
      </div>
      <div class="veg-section">
        <h4>各市場價格 (元/公斤)</h4>
        ${pricesHTML}
      </div>
      <div class="veg-section">
        <h4>推薦料理</h4>
        <div class="recipe-list">
          ${v.recipes.map(r=>`<span class="recipe-chip">${escape(r)}</span>`).join("")}
        </div>
      </div>
    </div>
  </div>`;
}
function attachCardToggle(container){
  container.querySelectorAll(".veg-card").forEach(card=>{
    card.addEventListener("click",()=>card.classList.toggle("expanded"));
  });
}

/* ============================================================
   渲染：菜價排行榜
   ============================================================ */
let rankOrder = "asc";
let rankMarket = "";

function buildRankMarketOptions(){
  const sel = document.getElementById("rankMarketFilter");
  const seen = new Set();
  priceData.forEach(p=>seen.add(p.marketName));
  Array.from(seen).sort().forEach(m=>{
    const o = document.createElement("option");
    o.value = m;
    const info = getMarketInfo(m);
    o.textContent = info.short;
    sel.appendChild(o);
  });
  sel.addEventListener("change",e=>{rankMarket=e.target.value;renderRank();});
}
document.querySelectorAll(".sort-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".sort-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    rankOrder = btn.dataset.order;
    renderRank();
  });
});

function renderRank(){
  const tbody = document.getElementById("rankTbody");
  let rows = priceData.filter(p => p.avgPrice > 0);
  if(rankMarket) rows = rows.filter(p => p.marketName === rankMarket);
  rows.sort((a,b)=> rankOrder==="asc" ? a.avgPrice - b.avgPrice : b.avgPrice - a.avgPrice);
  rows = rows.slice(0,80);

  if(!rows.length){
    tbody.innerHTML = `<tr><td colspan="4" class="loading">沒有資料</td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map((p,i)=>{
    const v = findVegByCropName(p.cropName);
    const emoji = v ? v.emoji : "🌱";
    const m = getMarketInfo(p.marketName);
    return `<tr>
      <td class="rank-num">${i+1}</td>
      <td><span class="rank-emoji">${emoji}</span>${escape(p.cropName)}</td>
      <td>${escape(m.short)}<br><small style="color:var(--muted)">📍 ${escape(m.addr)}</small></td>
      <td class="price-cell">$${p.avgPrice.toFixed(1)}</td>
    </tr>`;
  }).join("");
}

/* ============================================================
   搜尋
   ============================================================ */
const searchInput = document.getElementById("searchInput");
searchInput.addEventListener("input",doSearch);

function score(veg, q){
  const Q = q.toLowerCase();
  const k = veg.key.toLowerCase();
  if(k === Q) return 100;
  if(k.includes(Q)) return 80;
  for(const a of veg.aliases){
    const al = a.toLowerCase();
    if(al === Q) return 90;
    if(al.includes(Q) || Q.includes(al)) return 70;
  }
  // 食譜內含關鍵字也給少量分數（相關性）
  for(const r of veg.recipes){
    if(r.toLowerCase().includes(Q)) return 30;
  }
  // 中文部分字元
  for(const ch of Q){
    if(k.includes(ch)) return 20;
  }
  return 0;
}

function doSearch(){
  const q = searchInput.value.trim();
  const out = document.getElementById("searchResults");
  if(!q){
    out.innerHTML = `<div class="search-empty">輸入關鍵字開始搜尋</div>`;
    return;
  }
  const scored = VEGETABLES
    .map(v=>({v, s:score(v,q)}))
    .filter(x=>x.s>0)
    .sort((a,b)=>b.s-a.s);

  if(!scored.length){
    out.innerHTML = `<div class="search-empty">找不到「${escape(q)}」相關蔬菜，試試別的關鍵字？</div>`;
    return;
  }
  const ref = new Date().getMonth()+1;
  out.innerHTML = scored.map(x => vegCardHTML(x.v, ref)).join("");
  attachCardToggle(out);
  // 預設展開第一張
  const first = out.querySelector(".veg-card");
  if(first) first.classList.add("expanded");
}

/* ============================================================
   小工具
   ============================================================ */
function escape(s){
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

/* ============================================================
   初始化
   ============================================================ */
async function init(){
  buildMonthFilter();
  await fetchPriceData();
  const bar = document.getElementById("statusBar");
  if(dataMode === "api"){
    const dates = [...new Set(priceData.map(p=>p.date))].slice(0,1);
    bar.textContent = `✅ 已連線農業部行情 API ・ ${priceData.length} 筆交易紀錄 ・ ${dates[0]||""}`;
    bar.className = "status-bar";
  }else{
    bar.textContent = "⚠️ 無法連線農業部 API（可能是 CORS 或網路），目前顯示為內建示範資料";
    bar.className = "status-bar warn";
  }
  buildRankMarketOptions();
  renderIndex();
  renderRank();
}
init();
