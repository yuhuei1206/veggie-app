name: 每日更新菜價

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 02:00 = 台灣時間 10:00
  workflow_dispatch:       # 允許手動觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 抓取農業部菜價 API
        run: |
          curl -sf "https://data.moa.gov.tw/Service/OpenData/FromM/AgriProductsTransType.aspx?\$top=2000&\$format=json" \
            -o prices_raw.json \
            -H "Accept: application/json" || echo "[]" > prices_raw.json
          echo "原始資料大小: $(wc -c < prices_raw.json) bytes"

      - name: 處理資料
        run: |
          python3 - <<'EOF'
          import json
          try:
              with open("prices_raw.json", encoding="utf-8") as f:
                  data = json.load(f)
              if isinstance(data, dict):
                  data = data.get("value", data.get("data", []))
          except Exception as e:
              print(f"解析失敗: {e}")
              data = []
          rows = []
          for d in data:
              crop = d.get("CropName") or d.get("作物名稱","")
              market = d.get("MarketName") or d.get("市場名稱","")
              price = float(d.get("Avg_Price") or d.get("平均價") or 0)
              date = d.get("TransDate") or d.get("交易日期","")
              if crop and market and price > 0:
                  rows.append({"cropName":crop,"marketName":market,"avgPrice":price,"date":date})
          with open("prices.json","w",encoding="utf-8") as f:
              json.dump(rows, f, ensure_ascii=False)
          print(f"寫入 {len(rows)} 筆")
          EOF

      - name: 上傳 prices.json 到 GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'EOF'
          import json, base64, subprocess, urllib.request, urllib.error, os

          token = os.environ["GITHUB_TOKEN"]
          repo  = os.environ["GITHUB_REPOSITORY"]
          api   = f"https://api.github.com/repos/{repo}/contents/prices.json"
          headers = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github+json",
              "Content-Type": "application/json",
          }

          # 讀取現有檔案 SHA（若已存在）
          sha = None
          try:
              req = urllib.request.Request(api, headers=headers)
              with urllib.request.urlopen(req) as r:
                  sha = json.load(r).get("sha")
          except urllib.error.HTTPError as e:
              if e.code != 404:
                  raise

          with open("prices.json", "rb") as f:
              content = base64.b64encode(f.read()).decode()

          payload = {
              "message": "chore: 更新菜價",
              "content": content,
              "committer": {
                  "name": "github-actions[bot]",
                  "email": "github-actions[bot]@users.noreply.github.com"
              }
          }
          if sha:
              payload["sha"] = sha

          data = json.dumps(payload).encode()
          req = urllib.request.Request(api, data=data, headers=headers, method="PUT")
          with urllib.request.urlopen(req) as r:
              result = json.load(r)
              print(f"上傳成功：{result['content']['html_url']}")
          EOF
