name: 每日更新菜價

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 02:00 = 台灣時間 10:00
  workflow_dispatch:       # 允許手動觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 抓取農業部菜價 API
        run: |
          python3 - <<'EOF'
          import urllib.request, json, datetime

          API = "https://data.moa.gov.tw/api/v1/AgriProductsTransType"
          # 抓取所有類別：N04蔬菜 N05水果 N06花卉 N01牲畜 N02家禽 N08水產
          TC_TYPES = ["N04", "N05", "N06", "N01", "N02", "N08"]

          def fetch_date(date_str, tc_type):
              url = f"{API}?$top=2000&StartDate={date_str}&EndDate={date_str}&TcType={tc_type}"
              req = urllib.request.Request(url, headers={"Accept": "application/json"})
              with urllib.request.urlopen(req, timeout=15) as r:
                  payload = json.load(r)
              data = payload.get("Data", [])
              return [
                  {"cropName": x["CropName"], "marketName": x["MarketName"],
                   "avgPrice": float(x["Avg_Price"]), "date": x["TransDate"],
                   "tcType": x.get("TcType", tc_type)}
                  for x in data
                  if x.get("CropName","") != "休市" and float(x.get("Avg_Price",0)) > 0
              ]

          all_rows = []
          today = datetime.date.today()
          # 往前最多找 7 天，以蔬菜(N04)為基準判斷是否為休市日
          best_date = None
          for delta in range(7):
              d = today - datetime.timedelta(days=delta)
              roc_year = d.year - 1911
              date_str = f"{roc_year}.{d.month:02d}.{d.day:02d}"
              try:
                  veg_rows = fetch_date(date_str, "N04")
                  if veg_rows:
                      best_date = date_str
                      all_rows.extend(veg_rows)
                      print(f"找到蔬菜資料 {date_str}，共 {len(veg_rows)} 筆，繼續抓其他類別...")
                      break
                  else:
                      print(f"{date_str} 蔬菜休市，往前一天")
              except Exception as e:
                  print(f"{date_str} N04 抓取失敗: {e}")

          if best_date:
              for tc in ["N05", "N06", "N01", "N02", "N08"]:
                  try:
                      rows = fetch_date(best_date, tc)
                      all_rows.extend(rows)
                      print(f"TcType={tc} 取得 {len(rows)} 筆")
                  except Exception as e:
                      print(f"TcType={tc} 抓取失敗: {e}")

          with open("prices.json", "w", encoding="utf-8") as f:
              json.dump(all_rows, f, ensure_ascii=False)
          print(f"最終寫入 {len(all_rows)} 筆")
          EOF

      - name: 上傳 prices.json 到 GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'EOF'
          import json, base64, subprocess, urllib.request, urllib.error, os

          token = os.environ["GITHUB_TOKEN"]
          repo  = os.environ["GITHUB_REPOSITORY"]
          api   = f"https://api.github.com/repos/{repo}/contents/prices.json"
          headers = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github+json",
              "Content-Type": "application/json",
          }

          # 讀取現有檔案 SHA（若已存在）
          sha = None
          try:
              req = urllib.request.Request(api, headers=headers)
              with urllib.request.urlopen(req) as r:
                  sha = json.load(r).get("sha")
          except urllib.error.HTTPError as e:
              if e.code != 404:
                  raise

          with open("prices.json", "rb") as f:
              content = base64.b64encode(f.read()).decode()

          payload = {
              "message": "chore: 更新菜價",
              "content": content,
              "committer": {
                  "name": "github-actions[bot]",
                  "email": "github-actions[bot]@users.noreply.github.com"
              }
          }
          if sha:
              payload["sha"] = sha

          data = json.dumps(payload).encode()
          req = urllib.request.Request(api, data=data, headers=headers, method="PUT")
          with urllib.request.urlopen(req) as r:
              result = json.load(r)
              print(f"上傳成功：{result['content']['html_url']}")
          EOF
